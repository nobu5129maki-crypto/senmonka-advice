<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>悩み相談アプリ</title>
  <meta name="theme-color" content="#7c9a9e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="悩み相談">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f8f6f3;
      --bg-card: #ffffff;
      --accent-psych: #7c9a9e;
      --accent-law: #8b7355;
      --accent-fp: #6b8e6f;
      --accent-career: #9b7b8e;
      --text-primary: #2c2c2c;
      --text-secondary: #5a5a5a;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem;
      line-height: 1.6;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    .input-section {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
    }

    .age-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .age-row label {
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .age-row input {
      width: 100px;
      padding: 0.6rem 1rem;
      border: 2px solid #e8e4df;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .age-row input:focus {
      outline: none;
      border-color: var(--accent-psych);
    }

    .age-row input::placeholder {
      color: #aaa;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 1rem;
      border: 2px solid #e8e4df;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-psych);
    }

    textarea::placeholder {
      color: #aaa;
    }

    .recommended-section {
      background: rgba(124, 154, 158, 0.08);
      padding: 1.25rem;
      border-radius: var(--radius);
      border: 1px solid rgba(124, 154, 158, 0.2);
      margin-bottom: 1.5rem;
    }

    .topic-hint {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    .topic-hint.has-match {
      color: var(--text-primary);
    }

    .expert-section {
      margin-bottom: 1.5rem;
    }

    .expert-label {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
      color: var(--text-secondary);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    @media (min-width: 480px) {
      .buttons {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 640px) {
      .buttons {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .expert-btn {
      padding: 1rem 0.75rem;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      color: white;
      text-align: center;
      line-height: 1.3;
    }

    .expert-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }

    .expert-btn:active {
      transform: translateY(0);
    }

    .expert-btn.psych {
      background: linear-gradient(135deg, #7c9a9e 0%, #5f7d81 100%);
    }

    .expert-btn.law {
      background: linear-gradient(135deg, #8b7355 0%, #6d5a44 100%);
    }

    .expert-btn.fp {
      background: linear-gradient(135deg, #6b8e6f 0%, #526d55 100%);
    }

    .expert-btn.career {
      background: linear-gradient(135deg, #9b7b8e 0%, #7a6172 100%);
    }

    .expert-btn.same-age {
      background: linear-gradient(135deg, #8b9dc3 0%, #6d7fa3 100%);
    }

    .expert-btn.younger {
      background: linear-gradient(135deg, #b8a9c9 0%, #9a8bb9 100%);
    }

    .expert-btn.teens {
      background: linear-gradient(135deg, #a8d5ba 0%, #88b59a 100%);
    }

    .expert-btn.twenties {
      background: linear-gradient(135deg, #f5c77a 0%, #d5a75a 100%);
    }

    .expert-btn.thirties {
      background: linear-gradient(135deg, #e8a87c 0%, #c8885c 100%);
    }

    .expert-btn.forties {
      background: linear-gradient(135deg, #85c1e9 0%, #65a1c9 100%);
    }

    .expert-btn.fifties {
      background: linear-gradient(135deg, #c38d9e 0%, #a36d7e 100%);
    }

    .expert-btn.dad {
      background: linear-gradient(135deg, #7eb8b8 0%, #5e9898 100%);
    }

    .expert-btn.mom {
      background: linear-gradient(135deg, #d4a5a5 0%, #b48585 100%);
    }

    .response-section {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 120px;
      display: none;
    }

    .response-section.visible {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .response-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #f0ebe6;
    }

    .response-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .response-title {
      font-weight: 700;
      font-size: 1rem;
    }

    .response-content {
      font-size: 0.95rem;
      color: var(--text-primary);
      white-space: pre-wrap;
    }

    .response-placeholder {
      color: var(--text-secondary);
      font-style: italic;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    .error-msg {
      color: #c45c5c;
      font-size: 0.9rem;
    }

    .expert-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>悩み相談</h1>
      <p class="subtitle">いろいろな相談相手からアドバイスと、心のモヤモヤ向けセルフケアのヒントを受けましょう</p>
    </header>

    <section class="input-section">
      <div class="age-row">
        <label for="age-input">年齢（任意）</label>
        <input
          type="number"
          id="age-input"
          min="1"
          max="120"
          placeholder="例：30"
          inputmode="numeric"
        >
      </div>
      <label for="worry-input">あなたの悩みを入力してください</label>
      <textarea
        id="worry-input"
        placeholder="例：人間関係で悩んでいます…&#10;仕事とプライベートのバランスが取れません…"
      ></textarea>
    </section>

    <section class="recommended-section" aria-labelledby="recommended-heading">
      <p class="expert-label" id="recommended-heading">悩みの内容から専門家を選ぶ</p>
      <p class="topic-hint" id="topic-hint">悩みを入力すると、内容に近い専門家のボタンが表示されます。</p>
      <div class="buttons" id="recommended-buttons" role="group" aria-label="おすすめの専門家"></div>
    </section>

    <section class="expert-section">
      <p class="expert-label">相談したい人を選んでください</p>
      <div class="buttons">
        <button class="expert-btn psych" data-expert="psych">臨床心理士</button>
        <button class="expert-btn law" data-expert="law">弁護士</button>
        <button class="expert-btn fp" data-expert="fp">ファイナンシャルプランナー</button>
        <button class="expert-btn career" data-expert="career">キャリアカウンセラー</button>
        <button class="expert-btn same-age" data-expert="same_age">同い年</button>
        <button class="expert-btn younger" data-expert="younger">年下</button>
        <button class="expert-btn teens" data-expert="teens">10代</button>
        <button class="expert-btn twenties" data-expert="twenties">20代</button>
        <button class="expert-btn thirties" data-expert="thirties">30代</button>
        <button class="expert-btn forties" data-expert="forties">40代</button>
        <button class="expert-btn fifties" data-expert="fifties">50代</button>
        <button class="expert-btn dad" data-expert="dad">近所のお父さん</button>
        <button class="expert-btn mom" data-expert="mom">近所のお母さん</button>
      </div>
    </section>

    <section class="response-section" id="response-section">
      <div class="response-header">
        <div class="response-icon" id="response-icon"></div>
        <span class="response-title" id="response-title"></span>
      </div>
      <div class="response-content" id="response-content"></div>
    </section>
  </div>

  <script>
    const TOPIC_SPECIALISTS = ['psych', 'law', 'fp', 'career'];

    const topicKeywords = {
      psych: [
        '気分', 'メンタル', 'うつ', '不安', 'パニック', 'イライラ', '落ち込', '空虚', 'HSP',
        '睡眠', '不眠', '人間関係', '孤立', '孤独', '失恋', '夫婦', '家族', '親子', '育児',
        '気持ち', '心', 'カウンセリング', 'トラウマ', 'ストレス', '自信', '自己肯定', '生きづら',
        '引きこもり', '対人', '比較', '嫉妬', '過食', '拒食', '自傷', '死にたい', '苦痛'
      ],
      law: [
        '契約', '書面', '労働', '解雇', '未払い', '賃金', '残業代', '退職', 'パワハラ', 'セクハラ',
        '不法行為', '損害賠償', '慰謝料', '相続', '遺言', '遺産', '離婚', '養育費', '面会',
        '詐欺', '借金', '債務', '自己破産', '訴え', '裁判', '調停', '弁護', '示談', '内容証明',
        '更新', '解約', '賃貸', '敷金', '近隣', '騒音', '境界', '著作', '個人情報', '法的'
      ],
      fp: [
        '家計', '貯金', '貯蓄', '投資', 'NISA', 'iDeCo', 'ideco', '老後', '年金', 'FIRE',
        '住宅ローン', '借入', '金利', '保険', '生命保険', '医療保険', '学資', '学費',
        '税金', '確定申告', 'ふるさと納税', '節税', '副業', '所得税', '贈与', '相続税',
        'お金', '資産', '家計簿', '浪費', '赤字', '生活費', '給付', '奨学金返済'
      ],
      career: [
        '転職', '就活', '就職', 'キャリア', '辞めたい', '転職活動', '面接', '履歴書', '業界',
        '昇進', '評価', '給与', 'ボーナス', '残業', 'ワークライフ', 'WLB', 'リモート', '副業許可',
        'スキル', '資格', '勉強', '第二新卒', '新卒', 'ミドル', '転落', '職種', '社内政治',
        '上司', '部下', '同僚', '部署異動', '配置', '育休復帰', '復職', '独立', '開業'
      ]
    };

    const experts = {
      psych: { name: '臨床心理士', icon: '🧠', color: '#7c9a9e' },
      law: { name: '弁護士', icon: '⚖️', color: '#8b7355' },
      fp: { name: 'ファイナンシャルプランナー', icon: '💰', color: '#6b8e6f' },
      career: { name: 'キャリアカウンセラー', icon: '📋', color: '#9b7b8e' },
      same_age: { name: '同い年', icon: '🤝', color: '#8b9dc3' },
      younger: { name: '年下', icon: '✨', color: '#b8a9c9' },
      teens: { name: '10代', icon: '🌱', color: '#a8d5ba' },
      twenties: { name: '20代', icon: '🌟', color: '#f5c77a' },
      thirties: { name: '30代', icon: '💼', color: '#e8a87c' },
      forties: { name: '40代', icon: '📊', color: '#85c1e9' },
      fifties: { name: '50代', icon: '🍂', color: '#c38d9e' },
      dad: { name: '近所のお父さん', icon: '👨', color: '#7eb8b8' },
      mom: { name: '近所のお母さん', icon: '👩', color: '#d4a5a5' }
    };

    const worryInput = document.getElementById('worry-input');
    const ageInput = document.getElementById('age-input');
    const responseSection = document.getElementById('response-section');
    const responseIcon = document.getElementById('response-icon');
    const responseTitle = document.getElementById('response-title');
    const responseContent = document.getElementById('response-content');
    const recommendedButtons = document.getElementById('recommended-buttons');
    const topicHint = document.getElementById('topic-hint');

    function normalizeWorry(text) {
      return text.trim().toLowerCase();
    }

    function scoreTopicMatch(textNorm) {
      const scores = {};
      for (const key of TOPIC_SPECIALISTS) {
        scores[key] = 0;
        const list = topicKeywords[key];
        for (const kw of list) {
          if (textNorm.includes(kw.toLowerCase())) scores[key] += 1;
        }
      }
      return scores;
    }

    function renderRecommendedButtons() {
      const raw = worryInput.value;
      const textNorm = normalizeWorry(raw);
      recommendedButtons.innerHTML = '';

      if (!textNorm) {
        topicHint.textContent = '悩みを入力すると、内容に近い専門家のボタンが表示されます。';
        topicHint.classList.remove('has-match');
        return;
      }

      const scores = scoreTopicMatch(textNorm);
      const ranked = TOPIC_SPECIALISTS.slice()
        .map(key => ({ key, score: scores[key] }))
        .sort((a, b) => b.score - a.score);

      const hasStrong = ranked.some(r => r.score > 0);
      const toShow = hasStrong
        ? ranked.filter(r => r.score > 0).sort((a, b) => b.score - a.score)
        : ranked;

      topicHint.textContent = hasStrong
        ? '次のようなキーワードから、話を聞いてほしい専門家の候補です。ボタンを押すとその視点のアドバイスを取得できます。'
        : '入力文から強いヒントが得られなかったため、4分野すべてを並べました。どれか1つ選んで試せます。';
      topicHint.classList.toggle('has-match', hasStrong);

      const frag = document.createDocumentFragment();
      const specialistClass = { psych: 'psych', law: 'law', fp: 'fp', career: 'career' };
      for (const { key } of toShow) {
        const meta = experts[key];
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'expert-btn ' + specialistClass[key];
        btn.dataset.expert = key;
        btn.textContent = meta.name + 'の視点で聞く';
        frag.appendChild(btn);
      }
      recommendedButtons.appendChild(frag);
    }

    let recommendTimer;
    worryInput.addEventListener('input', () => {
      clearTimeout(recommendTimer);
      recommendTimer = setTimeout(renderRecommendedButtons, 200);
    });
    worryInput.addEventListener('blur', renderRecommendedButtons);
    renderRecommendedButtons();

    async function fetchAIResponse(worry, expertKey, age) {
      const body = { worry, expert: expertKey };
      if (age) body.age = age;
      const res = await fetch('/api/consult', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error('APIに接続できません。Vercelにデプロイするか、vercel dev でローカル実行してください。');
      }

      if (!res.ok) {
        throw new Error(data.error || 'エラーが発生しました');
      }
      return data.reply;
    }

    function setLoading(loading) {
      document.querySelectorAll('.container .expert-btn').forEach(btn => {
        btn.disabled = loading;
      });
    }

    document.querySelector('.container').addEventListener('click', async (e) => {
      const btn = e.target.closest('.expert-btn');
      if (!btn) return;

      const expertKey = btn.dataset.expert;
      const expert = experts[expertKey];
      if (!expert) return;

      const worry = worryInput.value.trim();

      if (!worry) {
        responseIcon.textContent = expert.icon;
        responseIcon.style.background = expert.color;
        responseTitle.textContent = expert.name + 'からのアドバイス';
        responseContent.textContent = '悩みを入力してから、相談したい人を選んでください。';
        responseContent.classList.add('response-placeholder');
        responseSection.classList.add('visible');
        responseSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return;
      }

      responseIcon.textContent = expert.icon;
      responseIcon.style.background = expert.color;
      responseTitle.textContent = expert.name + 'からのアドバイス';
      responseContent.innerHTML = '<span class="loading loading-dots">考え中</span>';
      responseContent.classList.remove('response-placeholder');
      responseSection.classList.add('visible');
      responseSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      setLoading(true);

      try {
        const age = ageInput.value.trim() ? parseInt(ageInput.value, 10) : null;
        const reply = await fetchAIResponse(worry, expertKey, age);
        responseContent.textContent = reply;
      } catch (err) {
        responseContent.innerHTML = `<span class="error-msg">${err.message}</span>`;
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
